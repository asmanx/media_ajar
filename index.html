<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            background-color: #E6F6FE;
            width: 100%;
            /* full lebar layar */
            max-width: 360px;
            /* batas maksimal (biar tetap seperti HP) */
            height: 100vh;
            /* full tinggi layar HP */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .img5 {
            margin-top: 0;
        }

        .img1 {
            width: 50%;
            height: auto;
        }

        .img2 {
            width: 45%;
            height: auto;
        }

        .img3 {
            width: 90%;
            height: auto;
        }

        .menu {
            width: 80%;
            height: 50px;
            margin-top: 50px;
            background-image: url(img/img4.png);
            background-size: cover;
            border: none;
            border-radius: 50px;
        }
    </style>
</head>

<body>
    <div class="in">
        <div class="page">
            <img src="img/img5.png" alt="">

            <div class="content">
                <img class="img1" src="img/img1.png" alt="">
                <img class="img2" src="img/img2.png" alt="">
                <img class="img3" src="img/img3.png" alt="">
                <button class="menu"></button>
            </div>
            <img src="img/img6.png" alt="">
        </div>
    </div>


</body>

</html>
